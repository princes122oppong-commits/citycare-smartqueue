<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Appointments · CityCare Hospital</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="department.css" />
</head>
<body>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <img class="brand-mark" src="../citycare.png" alt="CityCare Hospital" style="width:36px;height:36px;border-radius:10px;object-fit:cover;">
      <div class="brand-text">
        <div class="brand-title">SmartQueue</div>
        <div class="brand-title" style="margin-top:-4px;">Health</div>
      </div>
    </div>

<nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="queue.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        <span>Queue</span>
      </a>
      <a href="appointments.html" class="nav-link active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Appointments</span>
      </a>
      <a href="notifications.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 0-3.4 0"/></svg>
        <span>Notifications</span>
      </a>
    </nav>

    <div class="sidebar-bottom">
      <div id="deptInfo" class="dept-info">
        <div class="dept-avatar">C</div>
        <div class="dept-details">
          <div class="dept-name">Cardiology</div>
          <div class="dept-role">Department</div>
        </div>
      </div>
      <button class="signout-btn" id="signoutBtn">🚪 Sign Out</button>
    </div>
  </aside>

  <main class="main">
<header class="topbar">
      <button class="mobile-sidebar-toggle" data-sidebar-toggle aria-label="Toggle navigation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="7" x2="20" y2="7"></line>
          <line x1="4" y1="12" x2="20" y2="12"></line>
          <line x1="4" y1="17" x2="20" y2="17"></line>
        </svg>
      </button>
      <div>
        <div class="topbar-title" id="pageTitle">Appointments</div>
        <div class="topbar-sub" id="pageSub">View scheduled appointments for your department.</div>
      </div>
<div class="topbar-right">
        <a href="notifications.html" class="icon-btn" aria-label="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
          <span class="badge-dot">3</span>
        </a>
        <button class="icon-btn" id="refreshBtn" aria-label="Refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        </button>
      </div>
    </header>

    <main class="content">

      <!-- Stat cards -->
      <section class="stat-grid">
        <div class="stat-card">
          <div class="stat-icon stat-blue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </div>
          <div>
            <div class="stat-label">Today's Appointments</div>
            <div class="stat-value" id="statToday">0</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-green">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div>
            <div class="stat-label">Confirmed</div>
            <div class="stat-value" id="statConfirmed">0</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-amber">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/></svg>
          </div>
          <div>
            <div class="stat-label">Pending</div>
            <div class="stat-value" id="statPending">0</div>
          </div>
        </div>
      </section>

      <!-- Appointments table -->
      <div class="card" style="margin-top:18px;">
        <div class="card-head">
          <h3>All Appointments</h3>
          <span class="badge" id="apptBadge">0 total</span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr><th>Patient</th><th>Date & Time</th><th>Type</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="apptBody">
              <tr><td colspan="5">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script src="appointments.js"></script>
</body>
</html>
