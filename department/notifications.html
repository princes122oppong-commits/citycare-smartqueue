<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Notifications · CityCare Hospital</title>
<link rel="stylesheet" href="department.css" />
<link rel="stylesheet" href="css/notifications.css" />
</head>
<body>

<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img class="brand-mark" src="citycare.png" alt="CityCare Hospital" style="width:36px;height:36px;border-radius:10px;object-fit:cover;">
      <div class="brand-text">
        <div class="brand-title">SmartQueue</div>
        <div class="brand-title" style="margin-top:-4px;">Health</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="queue.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        <span>Queue</span>
      </a>
      <a href="appointments.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Appointments</span>
      </a>
      <a href="notifications.html" class="nav-link active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
        <span>Notifications</span>
        <span class="badge-dot" id="unread-badge" style="margin-left:auto;">0</span>
      </a>
    </nav>

    <div class="sidebar-bottom">
      <div id="deptInfo" class="dept-info">
        <div class="dept-avatar">D</div>
        <div class="dept-details">
          <div class="dept-name" id="dept-name">Department</div>
          <div class="dept-role">Staff</div>
        </div>
      </div>
      <button class="signout-btn" id="signoutBtn">🚪 Sign Out</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <header class="topbar">
      <div>
        <div class="topbar-title" id="pageTitle">Notifications</div>
        <div class="topbar-sub">Your department notifications and system alerts.</div>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" onclick="testToast()" title="Test popup notifications" aria-label="Test notifications">🧪</button>
      </div>
    </header>

    <main class="content">
      <!-- Stat cards -->
      <section class="stat-grid">
        <div class="stat-card">
          <div class="stat-icon stat-blue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
          </div>
          <div>
            <div class="stat-label">Unread</div>
            <div class="stat-value" id="stat-unread">0</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-green">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.17"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </div>
          <div>
            <div class="stat-label">Today</div>
            <div class="stat-value" id="stat-today">0</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-amber">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/></svg>
          </div>
          <div>
            <div class="stat-label">Total</div>
            <div class="stat-value" id="stat-total">0</div>
          </div>
        </div>
      </section>

      <div class="card" style="margin-top:18px;">
        <div class="card-head">
          <h3>Department Notifications</h3>
          <button class="select-pill" id="mark-all-read">Mark all as read</button>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr><th>Icon</th><th>Title</th><th>Time</th><th>Status</th></tr>
            </thead>
            <tbody id="notif-body">
              <tr><td colspan="4">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="shared/js/notifications-toast.js"></script>
<script src="js/notifications.js"></script>
</body>
</html>
