<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — CityCare Hospital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="register.css">
</head>
<body>

<div class="auth-page">

  <div class="auth-visual">
    <div class="visual-scene" aria-hidden="true">
      <img class="register-image" src="images (2).jpg" alt="CityCare Hospital registration illustration">
    </div>
  </div>

  <div class="auth-panel">
    <div class="auth-card">
      <a href="index.html" class="brand">
        <img class="brand-mark" src="citycare.png" alt="CityCare Hospital" style="width:34px;height:34px;border-radius:10px;object-fit:cover;">
        <span class="brand-name">SmartQueue<br>Health</span>
      </a>

      <h1>Create Your Account</h1>

      <form id="registerForm" novalidate>
        <div class="field-grid">
          <div class="field">
            <label for="fullName">Full Name</label>
            <div class="input-icon">
              <span class="icon">👤</span>
              <input type="text" id="fullName" name="fullName" placeholder="Full Name" autocomplete="name" required>
            </div>
            <span class="field-error" id="fullNameError"></span>
          </div>

          <div class="field">
            <label for="email">Email Address</label>
            <div class="input-icon">
              <span class="icon">✉</span>
              <input type="email" id="email" name="email" placeholder="Email Address" autocomplete="email" required>
            </div>
            <span class="field-error" id="emailError"></span>
          </div>

          <div class="field">
            <label for="mobile">Mobile Number</label>
            <div class="input-icon">
              <span class="icon">📞</span>
              <input type="tel" id="mobile" name="mobile" placeholder="Mobile Number" autocomplete="tel" required>
            </div>
            <span class="field-error" id="mobileError"></span>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="input-icon password-wrap">
              <span class="icon">🔒</span>
              <input type="password" id="password" name="password" placeholder="Password" autocomplete="new-password" required>
              <button type="button" class="toggle-visibility" id="toggleRegisterPassword" aria-label="Show password">👁</button>
            </div>
            <span class="field-error" id="passwordError"></span>
          </div>

          <div class="field field-span">
            <label for="confirmPassword">Confirm Password</label>
            <div class="input-icon password-wrap">
              <span class="icon">🔒</span>
              <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" autocomplete="new-password" required>
              <button type="button" class="toggle-visibility" id="toggleRegisterConfirmPassword" aria-label="Show password">👁</button>
            </div>
            <span class="field-error" id="confirmPasswordError"></span>
          </div>

          <div class="field">
            <label>Gender</label>
            <div class="segmented" id="genderGroup">
              <button type="button" class="segment active" data-value="Male">♂ Male</button>
              <button type="button" class="segment" data-value="Female">♀ Female</button>
              <button type="button" class="segment" data-value="Other">⚧ Other</button>
            </div>
            <input type="hidden" id="gender" name="gender" value="Male">
          </div>

        </div>

        <label class="checkbox terms">
          <input type="checkbox" id="agreeTerms" name="agreeTerms">
          <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
        </label>
        <span class="field-error" id="termsError"></span>

        <button type="submit" class="btn btn-primary btn-block">Register <span class="arrow">→</span></button>

        <p class="switch-auth">Already have an account? <a href="login.html">Login</a></p>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="register.js"></script>
</body>
</html>
