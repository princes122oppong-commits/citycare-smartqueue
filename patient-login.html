<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Patient Login — CityCare Hospital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login.css">
</head>
<body>

<div class="auth-page">

  <div class="auth-visual">
    <div class="visual-scene" aria-hidden="true">
      <img class="login-image" src="images (3).jpg" alt="CityCare Hospital login illustration">
    </div>
  </div>

  <div class="auth-panel">
    <div class="auth-card">
      <a href="index.html" class="brand">
        <img class="brand-mark" src="citycare.png" alt="CityCare Hospital" style="width:34px;height:34px;border-radius:10px;object-fit:cover;">
        <span class="brand-name">SmartQueue<br>Health</span>
      </a>

      <h1>Patient Login</h1>
      <p class="subtitle">Sign in to manage your appointments and queue status</p>

      <a href="login.html" class="link-muted center">Sign in with your account</a>

      <p class="switch-auth">Don't have an account? <a href="register.html">Register as Patient</a></p>
    </div>

    <div class="compliance-badge">
      <span class="badge-icon">🛡</span>
      <div>
        <strong>HIPAA Compliant</strong>
        <p>Secure & Private</p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="patient-login.js"></script>
</body>
</html>
